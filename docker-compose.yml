services:
  kfz-explorer:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data:ro
    environment:
      - DATA_DIR=/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/stats')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
